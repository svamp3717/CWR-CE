name: C++ / Build Windows

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
  CCACHE_NOHASHDIR: true

jobs:
  build:
    name: Windows RelWithDebInfo
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: '19'
          arch: 'x64'
          directory: 'C:\Program Files\LLVM'

      - name: Setup compiler cache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: ccache
          key: Windows-win-x64-clang-rwdi-pch
          max-size: 1G

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: .vcpkg-bincache/x64-windows-clang
          key: vcpkg-Windows-x64-windows-clang-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'cmake/vcpkg-triplets/**', 'cmake/vcpkg-overlay-ports/**') }}
          restore-keys: |
            vcpkg-Windows-x64-windows-clang-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-bincache/x64-windows-clang,readwrite
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache/x64-windows-clang
          VCPKG_DEFAULT_TRIPLET: x64-windows-clang
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/build/win-x64-clang-rwdi/vcpkg_installed
          VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/cmake/vcpkg-overlay-ports
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/cmake/vcpkg-triplets
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure
        run: >
          cmake
          --preset win-x64-clang-rwdi
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build/win-x64-clang-rwdi --parallel 2

      - name: Test
        shell: pwsh
        env:
          CTEST_EXCLUDE: 'PoseidonTests - (OAL -|PAAEncoder -|Image - Save to \.paa|World state file format --|PreviewImage - saveToFile writes|PreviewImageRGB - saveToFile writes)'
        run: ctest --test-dir 'build/win-x64-clang-rwdi' --output-on-failure -E "$env:CTEST_EXCLUDE"

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: Windows-exe
          path: |
            build/win-x64-clang-rwdi/**/*.exe
